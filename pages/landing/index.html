<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../assets/icons/favicon-32x32.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <title>NFT preview card component</title>
</head>

<body>
    <main>
        <div class="card">
            <div class="card__img-container"> <img src="../../assets/images/image-equilibrium.jpg" alt="equilibrium"
                    class="card__img"></div>
            <h1 class="card__title">Equilibrium #3429</h1>
            <p class="card__text">Our Equilibrium collection promotes balance and calm.</p>
            <p class="card__data">
                <img src="../../assets/icons/icon-ethereum.svg" alt="ethereum" class="card__icon">

                <span class="card__ETH">0.041 ETH</span>
                <img src="../../assets/icons/icon-clock.svg" alt="clock" class="card__clock">
                <span>3 days left</span>
            </p>
            <span class="line"></span>
            <div class="card__signature">
                <div class="card__avatar-container"><img src="../../assets/images/image-avatar.png" alt="avatar"
                        class="card__avatar"></div>
                <p class="card__signature-item">Creation of <span class="card__name">Jules Wyvern</span></p>
            </div>
        </div>
    </main>

</body>

</html>
